name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: reader

jobs:
  quality:
    name: Format, lint and host tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
      - name: Verify documentation pairs
        working-directory: .
        run: ./scripts/verify-doc-pairs.sh
      - name: Run quality gates
        run: ./gradlew ktlintCheck :androidApp:lintDebug :shared:testAndroidHostTest :androidApp:testDebugUnitTest

  android:
    name: Android debug and minified release
    needs: quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
      - name: Build Android variants
        run: ./gradlew :androidApp:assembleDebug :androidApp:assembleRelease
      - name: Verify R8 output
        run: test -s androidApp/build/outputs/mapping/release/mapping.txt

  ios:
    name: iOS simulator tests and app build
    needs: quality
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
      - uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-${{ runner.arch }}-konan-${{ hashFiles('reader/gradle/libs.versions.toml') }}
      - name: Report Apple toolchain
        run: xcodebuild -version
      - name: Test Kotlin on the iOS simulator target
        run: ./gradlew :shared:iosSimulatorArm64Test :shared:checkXcodeProjectConfiguration
      - name: Build unsigned iOS simulator app
        run: >-
          xcodebuild
          -project iosApp/iosApp.xcodeproj
          -scheme iosApp
          -configuration Debug
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath build/ios-derived-data
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          build
